<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crypto Developer Knowledge Graph</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="knowledge-shell">
      <aside class="nav-rail" aria-label="Knowledge graph navigation">
        <header class="app-header">
          <div>
            <p class="eyebrow">Intent-driven graph</p>
            <h1>Crypto Developer Knowledge Graph</h1>
          </div>
          <button id="reset" type="button">Reset</button>
        </header>

        <label class="search">
          <span>Find a node</span>
          <input id="search" type="search" placeholder="offline signer, staking, SCALE, bad signature">
        </label>

        <section class="nav-section" aria-label="Build goals">
          <p class="eyebrow">Build goals</p>
          <nav id="goals" class="goal-list" aria-label="Build goals"></nav>
        </section>

        <section class="trace-builder" aria-label="Trace Builder">
          <p class="eyebrow">Trace Builder</p>
          <form id="trace-form" class="trace-form">
            <input
              id="trace-prompt"
              type="search"
              placeholder="Go matching engine with Turnkey signing"
            >
            <button type="submit">Build Trace</button>
          </form>
        </section>

        <section id="summary" class="intent-summary"></section>
      </aside>

      <section class="workbench">
        <section id="detail" class="sidecar node-workspace" aria-live="polite"></section>

        <section class="canvas-wrap">
          <div class="section-head">
            <div>
              <p class="eyebrow">Local context</p>
              <h2 id="title">Build a wallet</h2>
            </div>
            <span id="counts"></span>
          </div>
          <div id="graph-controls" class="graph-controls"></div>
          <div id="graph" class="intent-canvas" role="application" aria-label="Focused local network graph"></div>
        </section>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
